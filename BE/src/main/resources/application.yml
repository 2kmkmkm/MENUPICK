server:
  port: 8080

spring:
  application:
    name: menupick

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:~/menupick;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  jackson:
    time-zone: Asia/Seoul

  ai:
    openai:
      api-key: ${OPEN_AI_KEY}
      chat:
        model: gpt-4o-mini

menupick:
  cors:
    allowed-origin: http://localhost:5173

  jwt:
    secret: ${JWT_SECRET_KEY}
    access-ttl-minutes: 1440 # ?? ?? ??
    refresh-ttl-days: 7

  kakao:
    rest-api-key: ${KAKAO_REST_API_KEY}

  ai: ${MENUPICK_AI:mock}


logging:
  level:
    org.hibernate.SQL: debug